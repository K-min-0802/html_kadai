<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>花畑の朝</title>

<style>

body{
    margin:0;
    font-family:"Yu Gothic",sans-serif;
}

.main{
    position:relative;
    width:960px;
    margin:auto;
}

.main img.bg{
    width:100%;
    display:block;
}

.message{
    position:absolute;
    top:40px;
    left:40px;

    background:rgba(255,255,255,0.7);

    padding:20px;

    color:#cc3366;

    font-size:26px;

    font-weight:bold;
}

.butterfly{
    position:absolute;
    width:90px;
}

.b1{
    left:250px;
    bottom:35px;
}

.b2{
    left:470px;
    bottom:120px;
}

.b3{
    left:640px;
    bottom:35px;
}

</style>

</head>

<body>

<div class="main">

<img src="bg0.png" class="bg">

<div class="message">
ぽかぽか陽気の穏やかな朝<br>
花畑では、蝶々がのんびり飛んでいます
</div>

<img src="butterfly.gif" class="butterfly b1">
<img src="butterfly.gif" class="butterfly b2">
<img src="butterfly.gif" class="butterfly b3">

</div>

</body>
</html>
